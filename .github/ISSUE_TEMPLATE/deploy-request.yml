name: Deployment Request
description: Request a deployment of OGSpy
labels:
  - deploy
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 OGSpy Deployment Request

        Submitting this form will trigger a deployment workflow.
        **No files will be deployed until the owner manually approves the request.**

  - type: textarea
    id: alliance
    attributes:
      label: Alliance Name
      description: The name of the alliance for which the deployment is requested.
      placeholder: "e.g. Galactic Federation"
    validations:
      required: true
