name: Deploy OGSpy to Infomaniak

# Triggered when the "deploy" label is applied to an issue (auto-applied by the issue template).
# The deployment is gated behind a GitHub Environment with required reviewer approval.
on:
  issues:
    types: [labeled]

permissions:
  issues: write  # post comments and close issues

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 – immediately acknowledge the request on the issue
  # Note: the trigger condition below is intentionally repeated across
  # all three jobs because GitHub Actions does not support YAML anchors.
  # If the trigger logic changes, update all three `if` blocks together.
  # ────────────────────────────────────────────────────────────────
  notify:
    name: Acknowledge request
    if: github.event_name == 'issues' && github.event.label.name == 'deploy'
    runs-on: ubuntu-latest
    steps:
      # ── Guard: only collaborators with Write / Admin access may trigger ──
      - name: Check author permission
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: author,
            });
            const allowed = ['admin', 'write'];
            if (!allowed.includes(data.permission)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🚫 Unauthorized\n\n@${author} — only repository collaborators with **Write** or **Admin** access can request a deployment.`,
              });
              core.setFailed(`User ${author} (permission: ${data.permission}) is not authorized to request a deployment.`);
            }

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🕐 Deployment Request Received',
                '',
                'Your request has been queued and is **awaiting manual approval** before any files are deployed.',
                '',
                `**Workflow run:** [#${context.runId}](${runUrl})`,
                '',
                '> The owner must approve the deployment in the Actions tab before it proceeds.',
              ].join('\n'),
            });

  # ────────────────────────────────────────────────────────────────
  # Job 2 – deploy (paused until owner approves via the environment)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Infomaniak
    needs: notify
    if: github.event_name == 'issues' && github.event.label.name == 'deploy'
    runs-on: ubuntu-latest
    # This environment has "Required reviewers" configured → the job
    # pauses here and sends an approval notification to the owner.
    outputs:
      version: ${{ steps.release.outputs.version }}
      alliance: ${{ steps.parse.outputs.alliance }}
      alliance_dir: ${{ steps.parse.outputs.alliance_dir }}
      table_prefix: ${{ steps.parse.outputs.table_prefix }}
      duplicate_alliance: ${{ steps.uniqueness.outputs.is_duplicate }}
    steps:
      # ── Parse alliance from issue form ──
      - name: Parse deployment inputs
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            let alliance = '';

            const body = context.payload.issue.body || '';

            // Read alliance from issue form (supports English and French labels).
            const allianceMatch = body.match(/### (?:Alliance Name|Nom de l'Alliance)[^\n]*\n+([^\n#]+)/i);
            if (allianceMatch) alliance = allianceMatch[1].trim();

            if (!alliance) {
              core.setFailed('Missing alliance name in issue form.');
              return;
            }

            // Build a safe folder name from the alliance value.
            const allianceDir = alliance
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/[^a-zA-Z0-9._-]+/g, '-')
              .replace(/-+/g, '-')
              .replace(/(^[-.]+|[-.]+$)/g, '')
              .toLowerCase();

            if (!allianceDir) {
              core.setFailed(`Alliance name "${alliance}" cannot be converted to a valid folder name.`);
              return;
            }

            // Table prefix must be alliance name in lowercase letters only.
            const tablePrefix = alliance
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .toLowerCase()
              .replace(/[^a-z]+/g, '') + '_';

            if (tablePrefix === '_') {
              core.setFailed(`Alliance name "${alliance}" does not contain any valid letters for table prefix.`);
              return;
            }

            core.setOutput('alliance', alliance);
            core.setOutput('alliance_dir', allianceDir);
            core.setOutput('table_prefix', tablePrefix);

      # ── Download latest release zip from OGSteam/ogspy ──
      - name: Download OGSpy release
        id: release
        env:
          GH_TOKEN: ${{ secrets.OGSPY_GITHUB_TOKEN }}
        run: |
          # Prefer the latest published release; fall back to latest draft
          VERSION=$(gh release list -R OGSteam/ogspy \
            --exclude-drafts --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)

          if [ -z "$VERSION" ]; then
            echo "::error::No published release found in OGSteam/ogspy"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Downloading OGSpy ${VERSION} …"
          gh release download "$VERSION" -R OGSteam/ogspy --pattern "*.zip" -O ogspy.zip

      # ── Extract the zip ──
      - name: Extract release archive
        run: unzip -q ogspy.zip -d ogspy/

      # ── Upload files to Infomaniak over SSH (rsync) ──
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Trust SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.INFOMANIAK_SSH_HOST }}" >> ~/.ssh/known_hosts

      # ── Refuse duplicate deployments for an already-created alliance ──
      - name: Refuse deployment if alliance already exists
        id: uniqueness
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
        run: |
          TARGET_DIR="${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"
          echo "is_duplicate=false" >> "$GITHUB_OUTPUT"

          if sshpass -e ssh -o StrictHostKeyChecking=no "${{ secrets.INFOMANIAK_SSH_USER }}@${{ secrets.INFOMANIAK_SSH_HOST }}" "test -d '$TARGET_DIR'"; then
            echo "is_duplicate=true" >> "$GITHUB_OUTPUT"
            echo "::error::Deployment refused: alliance '${{ steps.parse.outputs.alliance }}' already exists at $TARGET_DIR."
            exit 1
          fi

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USER }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          script: |
            mkdir -p "${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"

      - name: Deploy files via rsync over SSH
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
        run: |
          TARGET_DIR="${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"
          rsync -az --delete \
            --exclude='config/id.php' \
            --exclude='config/key.php' \
            --exclude='config/salt' \
            --exclude='install/install.lock' \
            --exclude='cache/**' \
            --exclude='logs/**' \
            -e "sshpass -e ssh -o StrictHostKeyChecking=no" \
            ./ogspy/ "${{ secrets.INFOMANIAK_SSH_USER }}@${{ secrets.INFOMANIAK_SSH_HOST }}:${TARGET_DIR}/"

      # ── Install (first deploy) then upgrade via SSH CLI ──
      - name: Run install/upgrade CLI via SSH
        env:
          OGSPY_DB_HOST: ${{ secrets.OGSPY_DB_HOST }}
          OGSPY_DB_USER: ${{ secrets.OGSPY_DB_USER }}
          OGSPY_DB_PASSWORD: ${{ secrets.OGSPY_DB_PASSWORD }}
          OGSPY_DB_NAME: ${{ secrets.OGSPY_DB_NAME }}
          OGSPY_ADMIN_USER: ${{ steps.parse.outputs.alliance }}
          OGSPY_ADMIN_PASSWORD: ogsteam
          OGSPY_TABLE_PREFIX: ${{ steps.parse.outputs.table_prefix }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USER }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          envs: OGSPY_DB_HOST,OGSPY_DB_USER,OGSPY_DB_PASSWORD,OGSPY_DB_NAME,OGSPY_ADMIN_USER,OGSPY_ADMIN_PASSWORD,OGSPY_TABLE_PREFIX
          script: |
            cd "${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"

            # Ensure required directories exist with write permissions
            echo "Ensuring required directories exist with proper permissions..."
            mkdir -p cache logs config
            chmod 755 cache logs config

            if [ ! -f "config/id.php" ]; then
              echo "No config/id.php found. Running first-time OGSpy installation via CLI..."

              if [ -z "$OGSPY_DB_HOST" ] || [ -z "$OGSPY_DB_USER" ] || [ -z "$OGSPY_DB_PASSWORD" ] || [ -z "$OGSPY_DB_NAME" ]; then
                echo "::error::Missing required secrets for first-time install. Expected: OGSPY_DB_HOST, OGSPY_DB_USER, OGSPY_DB_PASSWORD, OGSPY_DB_NAME."
                exit 1
              fi

              php install/upgrade_cli.php install \
                "$OGSPY_DB_HOST" \
                "$OGSPY_DB_USER" \
                "$OGSPY_DB_PASSWORD" \
                "$OGSPY_DB_NAME" \
                "$OGSPY_ADMIN_USER" \
                "$OGSPY_ADMIN_PASSWORD" \
                "" \
                "$OGSPY_TABLE_PREFIX"
            else
              echo "::error::Deployment refused: existing installation detected (config/id.php present)."
              exit 1
            fi

            php install/upgrade_cli.php upgrade

  # ────────────────────────────────────────────────────────────────
  # Job 3 – always runs last; posts the outcome back to the issue
  # ────────────────────────────────────────────────────────────────
  comment-result:
    name: Post result
    needs: deploy
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'issues' && github.event.label.name == 'deploy'
    steps:
      - name: Comment – success
        if: needs.deploy.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.deploy.outputs.version }}';
            const alliance = '${{ needs.deploy.outputs.alliance }}';
            const allianceDir = '${{ needs.deploy.outputs.alliance_dir }}';
            const tablePrefix = '${{ needs.deploy.outputs.table_prefix }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ✅ Deployment Successful',
                '',
                `**🌐 URL:** https://ogspy.fr/${allianceDir}`,
                '',
                '### 🔑 Admin Credentials',
                `- **Username:** \`${alliance}\``,
                `- **Password:** \`ogsteam\``,
                '',
                '### ⚠️ Sécurité',
                '- Changez le mot de passe admin immédiatement après la première connexion.',
                '',
                '### 📚 Liens utiles',
                '- Documentation : https://wiki.ogsteam.eu/',
                '- Discord: https://discord.gg/Azcb67b',
                '',
                '### 📦 Deployment Details',
                `- **Version:** \`${version}\``,
                `- **Alliance:** ${alliance}`,
                '',
                `**Workflow run:** [#${context.runId}](${runUrl})`,
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Comment – failure
        if: needs.deploy.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const duplicateAlliance = '${{ needs.deploy.outputs.duplicate_alliance }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = duplicateAlliance
              ? [
                  '## 🚫 Deployment Refused',
                  '',
                  'An OGSpy instance with this alliance name already exists. Duplicate-name deployments are not allowed.',
                  '',
                  'Please use a different alliance name if you need a new instance.',
                  '',
                  `**Workflow run:** [#${context.runId}](${runUrl})`,
                ].join('\n')
              : [
                  '## ❌ Deployment Failed',
                  '',
                  'The deployment encountered an error. Review the workflow logs for details.',
                  '',
                  `**Workflow run:** [#${context.runId}](${runUrl})`,
                ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Comment – rejected / cancelled
        if: needs.deploy.result == 'cancelled'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🚫 Deployment Rejected\n\nThe deployment request was rejected or cancelled by the owner.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
