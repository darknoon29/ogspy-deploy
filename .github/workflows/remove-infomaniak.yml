name: Remove OGSpy from Infomaniak

# Triggered when the "remove" label is applied to an issue (auto-applied by the issue template).
# The deletion is gated behind a GitHub Environment with required reviewer approval.
on:
  issues:
    types: [labeled]

permissions:
  issues: write  # post comments and close issues

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 – immediately acknowledge the request on the issue
  # ────────────────────────────────────────────────────────────────
  notify:
    name: Acknowledge request
    if: github.event_name == 'issues' && github.event.label.name == 'remove'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🕐 Removal Request Received',
                '',
                'Your request has been received and is **awaiting approval** from the repository maintainers.',
                '',
                '**Workflow run:** [#' + context.runId + '](' + runUrl + ')',
                '',
                '> ⚠️ Once approved, this action is **irreversible**: all files and database tables for this alliance will be permanently deleted.',
              ].join('\n'),
            });

  # ────────────────────────────────────────────────────────────────
  # Job 2 – remove (paused until owner approves via the environment)
  # ────────────────────────────────────────────────────────────────
  remove:
    name: Remove from Infomaniak
    needs: notify
    if: github.event_name == 'issues' && github.event.label.name == 'remove'
    runs-on: ubuntu-latest
    environment: infomaniak
    outputs:
      alliance: ${{ steps.parse.outputs.alliance }}
      alliance_dir: ${{ steps.parse.outputs.alliance_dir }}
      table_prefix: ${{ steps.parse.outputs.table_prefix }}
    steps:
      # ── Parse alliance from issue form ──
      - name: Parse removal inputs
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Read alliance from issue form (supports English and French labels).
            const allianceMatch = body.match(/### (?:Alliance Name|Nom de l'Alliance)[^\n]*\n+([^\n#]+)/i);
            const alliance = allianceMatch ? allianceMatch[1].trim() : '';

            if (!alliance) {
              core.setFailed('Missing alliance name in issue form.');
              return;
            }

            const allianceDir = alliance
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/[^a-zA-Z0-9._-]+/g, '-')
              .replace(/-+/g, '-')
              .replace(/(^[-.]+|[-.]+$)/g, '')
              .toLowerCase();

            if (!allianceDir) {
              core.setFailed(`Alliance name "${alliance}" cannot be converted to a valid folder name.`);
              return;
            }

            const tablePrefix = alliance
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .toLowerCase()
              .replace(/[^a-z]+/g, '') + '_';

            if (tablePrefix === '_') {
              core.setFailed(`Alliance name "${alliance}" does not contain any valid letters for table prefix.`);
              return;
            }

            core.setOutput('alliance', alliance);
            core.setOutput('alliance_dir', allianceDir);
            core.setOutput('table_prefix', tablePrefix);

      # ── Install sshpass ──
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Trust SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.INFOMANIAK_SSH_HOST }}" >> ~/.ssh/known_hosts

      # ── Verify the alliance directory exists before proceeding ──
      - name: Check alliance exists
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
        run: |
          TARGET_DIR="${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"
          if ! sshpass -e ssh -o StrictHostKeyChecking=no "${{ secrets.INFOMANIAK_SSH_USER }}@${{ secrets.INFOMANIAK_SSH_HOST }}" "test -d '$TARGET_DIR'"; then
            echo "::error::Alliance '${{ steps.parse.outputs.alliance }}' not found at $TARGET_DIR. Nothing to delete."
            exit 1
          fi

      # ── Run the OGSpy CLI uninstall command via SSH ──
      - name: Run uninstall CLI via SSH
        env:
          OGSPY_DB_HOST: ${{ secrets.OGSPY_DB_HOST }}
          OGSPY_DB_USER: ${{ secrets.OGSPY_DB_USER }}
          OGSPY_DB_PASSWORD: ${{ secrets.OGSPY_DB_PASSWORD }}
          OGSPY_DB_NAME: ${{ secrets.OGSPY_DB_NAME }}
          OGSPY_TABLE_PREFIX: ${{ steps.parse.outputs.table_prefix }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USER }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          envs: OGSPY_DB_HOST,OGSPY_DB_USER,OGSPY_DB_PASSWORD,OGSPY_DB_NAME,OGSPY_TABLE_PREFIX
          script: |
            TARGET_DIR="${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"
            cd "$TARGET_DIR"

            echo "Running OGSpy uninstall CLI to drop database tables..."
            php install/upgrade_cli.php uninstall \
              "$OGSPY_DB_HOST" \
              "$OGSPY_DB_USER" \
              "$OGSPY_DB_PASSWORD" \
              "$OGSPY_DB_NAME" \
              "$OGSPY_TABLE_PREFIX"

      # ── Remove all files ──
      - name: Delete alliance files via SSH
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
        run: |
          TARGET_DIR="${{ format('{0}/{1}', secrets.INFOMANIAK_DEPLOY_PATH, steps.parse.outputs.alliance_dir) }}"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${{ secrets.INFOMANIAK_SSH_USER }}@${{ secrets.INFOMANIAK_SSH_HOST }}" \
            "rm -rf '$TARGET_DIR'"
          echo "Deleted $TARGET_DIR"

  # ────────────────────────────────────────────────────────────────
  # Job 3 – always runs last; posts the outcome back to the issue
  # ────────────────────────────────────────────────────────────────
  comment-result:
    name: Post result
    needs: remove
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'issues' && github.event.label.name == 'remove'
    steps:
      - name: Comment – success
        if: needs.remove.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const alliance = '${{ needs.remove.outputs.alliance }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ✅ Removal Successful',
                '',
                `The OGSpy instance for alliance **${alliance}** has been fully removed:`,
                '- 🗑️ All files deleted from the server',
                '- 🗄️ All database tables dropped',
                '',
                `**Workflow run:** [#${context.runId}](${runUrl})`,
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Comment – failure
        if: needs.remove.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Removal Failed',
                '',
                'The undeploy encountered an error. Review the workflow logs for details.',
                '',
                `**Workflow run:** [#${context.runId}](${runUrl})`,
              ].join('\n'),
            });

      - name: Comment – rejected / cancelled
        if: needs.remove.result == 'cancelled'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🚫 Undeploy Rejected\n\nThe undeploy request was rejected or cancelled by the owner.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_played',
            });
